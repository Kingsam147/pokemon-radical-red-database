name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Frontend dependencies
        working-directory: Frontend
        run: pnpm install --frozen-lockfile

      - name: ESLint (Frontend)
        working-directory: Frontend
        run: pnpm lint

      - name: TypeScript check (Frontend)
        working-directory: Frontend
        run: npx tsc --noEmit

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install Backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Audit Backend
        working-directory: Backend
        run: npm audit --audit-level=high

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install Backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Run unit tests
        working-directory: Backend
        run: npm test
        env:
          NODE_ENV: test

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install Backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Run integration tests
        working-directory: Backend
        run: npm run test:integration
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/pokemon_test
          REDIS_URL: redis://localhost:6379
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Install Frontend dependencies
        working-directory: Frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: Frontend
        run: npx playwright install --with-deps chromium

      - name: Build Frontend
        working-directory: Frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3500
          NEXT_PUBLIC_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          NEXT_PUBLIC_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          NEXT_PUBLIC_AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}

      - name: Start Backend
        working-directory: Backend
        run: node server.js &
        env:
          NODE_ENV: test
          PORT: 3500
          MONGODB_URI: mongodb://localhost:27017/pokemon_test
          REDIS_URL: redis://localhost:6379
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          GUEST_COOKIE_SECRET: test-secret

      - name: Start Frontend
        working-directory: Frontend
        run: pnpm start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3500

      - name: Wait for services
        run: npx wait-on http://localhost:3000 http://localhost:3500/health --timeout 60000

      - name: Run E2E tests
        working-directory: Frontend
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          AUTH0_TEST_USERNAME: ${{ secrets.AUTH0_TEST_USERNAME }}
          AUTH0_TEST_PASSWORD: ${{ secrets.AUTH0_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/playwright-report/

  docker-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pokemon-radical-red:${{ github.sha }} .

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  claude-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this PR against the project CLAUDE.md standards. Check for:
            - Bugs and logic errors
            - Security vulnerabilities
            - Redis cache usage correctness
            - Docker configuration issues
            - Naming conventions and code style violations
          claude_args: '--max-turns 5'
